name: Build Wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-15-intel: GitHub retired the macos-13 runners; jobs queued forever
        os: [ubuntu-latest, macos-15-intel, macos-14, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # On Windows the MSYS2 toolchain below is used instead; the gcc that
      # this action installs via chocolatey cannot find its own headers
      # (fatal error: stdlib.h) when invoked through the chocolatey shims.
      - uses: fortran-lang/setup-fortran@v1
        if: runner.os != 'Windows'
        id: setup-fortran
        with:
          version: 12 # should be available on all runners

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          # pkgconf lets meson find openblas.pc, skipping its flaky CMake probe
          install: >-
            mingw-w64-x86_64-gcc-fortran
            mingw-w64-x86_64-openblas
            mingw-w64-x86_64-pkgconf
          path-type: minimal
          release: false

      # Make the MSYS2 gcc/gfortran/OpenBLAS visible to cibuildwheel;
      # meson.build already searches C:/msys64/mingw64/lib for OpenBLAS
      - name: Add MSYS2 MinGW64 to PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "C:/msys64/mingw64/bin" >> "$GITHUB_PATH"
        shell: bash

      # https://github.com/pypa/cibuildwheel/issues/563
      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=$(sw_vers -productVersion | cut -d '.' -f 1-2)" >> $GITHUB_ENV

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.4

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

      # The cibuildwheel tests above run with MSYS2 on PATH (and ctypes.py
      # falls back to hardcoded C:/msys64 paths), so they cannot detect a
      # wheel that fails to bundle its DLLs. Hide MSYS2 and run the test
      # suite against the repaired wheel in a clean environment.
      - uses: actions/setup-python@v5
        if: runner.os == 'Windows'
        with:
          python-version: "3.13"

      - name: Check wheel is self-contained (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Rename-Item C:/msys64 msys64-hidden
          python -m venv $env:RUNNER_TEMP/verify-venv
          & "$env:RUNNER_TEMP/verify-venv/Scripts/python" -m pip install pytest pytest-cov
          $wheel = Get-ChildItem wheelhouse -Filter "*cp313*win_amd64.whl" | Select-Object -First 1
          & "$env:RUNNER_TEMP/verify-venv/Scripts/python" -m pip install $wheel.FullName
          Set-Location $env:RUNNER_TEMP
          & "$env:RUNNER_TEMP/verify-venv/Scripts/python" -m pytest --import-mode=importlib "$env:GITHUB_WORKSPACE/tests"

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # meson-python configures the project even for an sdist build,
      # and meson.build requires BLAS/LAPACK and a Fortran compiler
      - name: Install OpenBLAS
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev gfortran

      - name: Build SDist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
